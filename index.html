<html>
<head>
<style>
div{
width:100px;
height:100px;
background:pink;
color:green;
border:5px solid red;
transition-duration:4s;

}
#rotateX:hover{
transform:rotateX(140deg);
}
#rotateY:hover{
transform:rotateY(140deg);
}
#rotateZ:hover{
transform:rotateZ(90deg);
}
</style>
</head>
<body>
<div id="rotateX">rotate X me!</div>
<br>
<div id="rotateY">rotate Y me!</div>
<br>
<div id="rotateZ">rotate Z me!</div>
<br>
</body>
</html>
